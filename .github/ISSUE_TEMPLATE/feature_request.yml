name: Feature request
description: Suggest an improvement to VedWriter
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user need or workflow would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
